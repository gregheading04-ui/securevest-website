{% extends "base.html" %}
{% block content %}

<h2 style="text-align:center;">Deposit</h2>

<div class="card">

    <form method="POST">
        <input type="number" name="amount" placeholder="Enter amount" required>

        <button class="btn" type="submit">Submit Deposit</button>
    </form>

</div>

<style>
.card {
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:420px;
    margin:20px auto;
}

input {
    width:100%;
    padding:14px;
    margin:12px 0;
    border-radius:8px;
    border:none;
    font-size:16px;
}

.btn {
    width:100%;
    padding:14px;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
}
</style>

{% endblock %}
