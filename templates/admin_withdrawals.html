{% extends "base.html" %}
{% block content %}

<h2>Admin - Withdrawals</h2>

{% for w in withdrawals %}
<div class="card">

    <p><b>User:</b> {{ w.user }}</p>
    <p><b>Amount:</b> ₦{{ w.amount }}</p>
    <p><b>Bank:</b> {{ w.bank }}</p>
    <p><b>Account:</b> {{ w.account }}</p>

    <p>
        <b>Status:</b> 
        <span style="
            color:
            {% if w.status == 'pending' %}orange
            {% elif w.status == 'approved' %}lightgreen
            {% else %}red
            {% endif %}
        ">
            {{ w.status }}
        </span>
    </p>

    {% if w.status == "pending" %}
        <a href="/approve-withdraw/{{ loop.index0 }}" class="btn"> Approve</a>
        <a href="/reject-withdraw/{{ loop.index0 }}" class="btn btn-danger"> Reject</a>
    {% endif %}

</div>
{% endfor %}

{% endblock %}
