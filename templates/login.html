{% extends "base.html" %}
{% block content %}

<h2 style="text-align:center;">Login</h2>

<div class="card">

    {% if error %}
        <div style="background:#ff4d4d; color:white; padding:10px; border-radius:5px; margin-bottom:10px;">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button class="btn" type="submit">Login</button>
    </form>

</div>

<p style="text-align:center;">
    Don’t have an account? <a href="/register">Register</a>
</p>

<style>
.card {
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    max-width:400px;
    margin:20px auto;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:5px;
    border:none;
}

.btn {
    width:100%;
    padding:12px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:5px;
}
</style>

{% endblock %}
