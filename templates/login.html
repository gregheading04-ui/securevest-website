<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body { background:#0f172a; color:white; font-family:Arial; text-align:center; padding-top:80px;}
input { padding:12px; margin:10px; width:250px; border-radius:5px; border:none;}
button { padding:12px 25px; background:#22c55e; border:none; color:white; border-radius:5px;}
a { color:#22c55e; display:block; margin-top:10px;}
</style>
</head>
<body>

<h2>Login</h2>

<form method="POST">
<input name="username" placeholder="Username"><br>
<input name="password" type="password" placeholder="Password"><br>
<button type="submit">Login</button>
</form>

<a href="/register">Don't have an account? Register</a>

</body>
</html>
